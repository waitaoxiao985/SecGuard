# SecGuard 认证安全规则集
# 覆盖 PAM、sudo、登录失败等场景

rules:
  - rule_id: 5500
    name: "PAM 认证失败"
    level: 5
    category: authentication
    description: "PAM 模块报告认证失败"
    mitre:
      tactic: ["TA0006"]
      technique: ["T1110"]
    pci_dss: ["10.2.4"]
    conditions:
      field_match:
        - field: "message"
          operator: "regex"
          value: "authentication failure|auth could not identify|pam_unix.*authentication failure"
      extract:
        - field: "username"
          from: "message"
          regex: "user=(\\S+)"

  - rule_id: 5510
    name: "sudo 权限提升"
    level: 4
    category: authentication
    description: "用户使用 sudo 执行特权命令"
    mitre:
      tactic: ["TA0004"]
      technique: ["T1548.003"]
    pci_dss: ["10.2.2"]
    conditions:
      field_match:
        - field: "program"
          operator: "equals"
          value: "sudo"
      extract:
        - field: "username"
          from: "message"
          regex: "(\\S+)\\s+:"
        - field: "command"
          from: "message"
          regex: "COMMAND=(.+)"

  - rule_id: 5520
    name: "多次登录失败"
    level: 8
    category: authentication
    description: "检测到多次连续登录失败，疑似暴力破解"
    mitre:
      tactic: ["TA0006"]
      technique: ["T1110"]
    pci_dss: ["10.2.4", "10.2.5", "11.4"]
    conditions:
      field_match:
        - field: "message"
          operator: "regex"
          value: "(\\d+) authentication failure|multiple authentication failures|repeated login failures"
      extract:
        - field: "source_ip"
          from: "message"
          regex: "rhost=(\\S+)"
