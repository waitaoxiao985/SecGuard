server:
  port: 8900

spring:
  application:
    name: secguard-server

  # ===== 数据库 =====
  datasource:
    url: jdbc:mysql://localhost:3306/secguard?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 111111
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000  # 5min

  # ===== JPA =====
  jpa:
    hibernate:
      ddl-auto: validate  # Flyway 管理 DDL，JPA 仅验证
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ===== Flyway =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ===== Redis =====
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ===== Jackson =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# ===== SecGuard 自定义配置 =====
secguard:
  # JWT 配置
  jwt:
    secret: SecGuard-JWT-Secret-Key-2026-Please-Change-In-Production-At-Least-256-Bits
    expiration: 86400000  # 24小时
    issuer: secguard-server

  # Agent 配置
  agent:
    heartbeat-timeout: 120       # Agent 心跳超时（秒），超过此时间标记为离线
    health-check-interval: 30000 # 健康检查扫描间隔（毫秒）
    cleanup-interval: 3600       # 清理过期 Agent 间隔（秒）

  # 规则引擎
  engine:
    rules-path: classpath:rules/
    reload-on-change: true

  # FIM 高危文件监控规则（路径匹配到变更事件时自动触发告警）
  fim:
    high-risk-paths:
      - pattern: "/etc/passwd"
        severity: 12
        description: "Critical system file modified: /etc/passwd"
        mitre-technique: "T1548.001"
        mitre-tactic: "TA0004"
      - pattern: "/etc/shadow"
        severity: 14
        description: "Critical credential file modified: /etc/shadow"
        mitre-technique: "T1003.008"
        mitre-tactic: "TA0006"
      - pattern: ".ssh/authorized_keys"
        severity: 12
        description: "SSH authorized_keys modified — possible persistence"
        mitre-technique: "T1098.004"
        mitre-tactic: "TA0003"
      - pattern: "/etc/sudoers"
        severity: 13
        description: "Sudoers file modified — privilege escalation risk"
        mitre-technique: "T1548.003"
        mitre-tactic: "TA0004"
      - pattern: "/etc/crontab"
        severity: 10
        description: "System crontab modified — possible persistence"
        mitre-technique: "T1053.003"
        mitre-tactic: "TA0003"
      - pattern: "/etc/ld.so.preload"
        severity: 14
        description: "Shared library preload modified — possible rootkit"
        mitre-technique: "T1574.006"
        mitre-tactic: "TA0003"

# ===== 日志 =====
logging:
  level:
    com.secguard: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
