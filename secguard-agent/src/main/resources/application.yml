server:
  port: 8901  # Agent 端口（避免与 Server 8900 冲突）

spring:
  application:
    name: secguard-agent
  main:
    banner-mode: off

# ===== Agent 配置 =====
secguard:
  agent:
    # Server 地址
    server-url: http://localhost:8900
    # Agent 名称（首次注册时上报）
    name: secguard-agent-01
    # 本地数据目录（存放 agent_key、offset 等）
    data-dir: .secguard

  # 日志采集配置
  log:
    paths:
      - "C:/logs/test-app.log"
    interval: 5  # 采集间隔（秒）
    max-batch-size: 100  # 单次最大采集条数

  # FIM 文件完整性监控配置
  fim:
    paths:
      - "C:/secguard-fim-test"
    interval: 30  # 扫描间隔（秒），测试用 30s，生产建议 300s
    max-file-size-mb: 10  # 单文件最大哈希大小（MB）

  # 心跳配置
  heartbeat:
    interval: 30  # 心跳间隔（秒）

# ===== 日志 =====
logging:
  level:
    com.secguard: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{20} - %msg%n"
